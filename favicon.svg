<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="metaphysicalGlow" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
      <stop offset="0%" stop-color="#9d50bb" stop-opacity="1" />
      <stop offset="100%" stop-color="#6e48aa" stop-opacity="0.8" />
    </radialGradient>
    <filter id="neonBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="15" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Deep Obsidian Background Base -->
  <rect width="512" height="512" fill="#050505" rx="120" />

  <!-- Metaphysical Outer Geometry (Golden Ratio inspired Diamond/Eye) -->
  <g transform="translate(256, 256)">
    <!-- Outer ethereal rings -->
    <circle cx="0" cy="0" r="190" fill="none" stroke="rgba(157, 80, 187, 0.3)" stroke-width="2" stroke-dasharray="10 15" />
    <circle cx="0" cy="0" r="160" fill="none" stroke="rgba(110, 72, 170, 0.5)" stroke-width="4" stroke-dasharray="2 10" />

    <!-- Sharp metaphysical diamond container -->
    <path d="M0 -210 L210 0 L0 210 L-210 0 Z" fill="none" stroke="url(#metaphysicalGlow)" stroke-width="8" filter="url(#neonBlur)" opacity="0.8" />

    <!-- Inner Eye/Prism shape -->
    <path d="M-130 0 Q0 -90 130 0 Q0 90 -130 0 Z" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.4" />
    
    <!-- The WP Monogram - runic and interconnected -->
    <!-- W -->
    <path d="M-60 -40 L-40 60 L0 -10 L40 60 L60 -40" fill="none" stroke="url(#metaphysicalGlow)" stroke-width="22" stroke-linecap="round" stroke-linejoin="round" filter="url(#neonBlur)" />
    
    <!-- P (Overlapping the W to create a paradox loop) -->
    <path d="M-15 -60 L15 -60 Q55 -60 55 -25 Q55 10 15 10 L-15 10 Z" fill="none" stroke="#ffffff" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.9" />
    <line x1="-15" y1="-60" x2="-15" y2="80" stroke="#ffffff" stroke-width="20" stroke-linecap="round" opacity="0.9" />
    
    <!-- Central focus dot (the singularity) -->
    <circle cx="0" cy="-25" r="8" fill="#00ffff" filter="url(#neonBlur)" />
  </g>
</svg>
